// ── Saved score view ──
// Human label for a stored photo slot id (v2 `roomId|i` or legacy slot id).
function _slotLabelFromId(id) {
  const parts = id.split('|');
  if (parts.length === 2) {
    const room = allRooms().find(r => r.id === parts[0]);
    const i = parseInt(parts[1], 10) || 0;
    return room ? slotLabel(room, i, room.daily) : `${parts[0]} ${i + 1}`;
  }
  const legacy = [...DAILY_ROOM, ...DAILY_BATH].find(s => s.id === id);
  return legacy ? legacy.label : id;
}
// Grid of score cards from rows [{label, s, max, n}].
function _scoreCards(rows) {
  const grid = document.createElement('div'); grid.className = 'score-grid';
  rows.forEach(c => {
    const item = document.createElement('div'); item.className = 'score-item';
    item.innerHTML = `<div class="score-cat">${c.label}</div>
      <div class="score-num" style="color:${scoreColor(c.s, c.max)}">${c.s}<span class="score-max"> /${c.max}</span></div>
      ${c.n ? `<div class="score-note">${c.n}</div>` : ''}`;
    grid.appendChild(item);
  });
  return grid;
}
// Score rows for a saved entry — per-room (v2) or legacy categories.
function entryRows(entry) {
  if (entry && entry.scores) {
    return Object.keys(entry.scores).map(k => {
      const sc = entry.scores[k];
      return { label: sc.name || (allRooms().find(r => r.id === k) || {}).name || k,
               s: sc.s || 0, max: sc.max || 0, n: sc.n || '' };
    });
  }
  const cats = [...ROOM_CATS, ...(entry && entry.hasBath ? BATH_CATS : [])];
  return cats.map(c => ({ label: c.label, s: entry[c.key] ?? 0, max: c.max, n: '' }));
}

function renderSavedScore(el, entry) {
  const boy = S.boy, day = S.day;
  const sec = mkCard(`Saved Score — ${boy} / ${day}`);

  // Photos for this day are fetched on demand the first time it's viewed.
  if (!S.savedPhotos[boy] || S.savedPhotos[boy][day] === undefined) {
    ensurePhotosLoaded(boy, day);
  }
  const dayPhotos = S.savedPhotos[boy]?.[day] || {};
  const photoIds = Object.keys(dayPhotos).filter(id => dayPhotos[id]);
  if (photoIds.length) {
    const pLbl = document.createElement('div');
    pLbl.className = 'lbl'; pLbl.textContent = 'Photos from this day';
    sec.appendChild(pLbl);
    const pGrid = document.createElement('div'); pGrid.className = 'slot-grid';
    photoIds.forEach(id => {
      const wrap = document.createElement('div');
      wrap.className = 'slot'; wrap.style.cursor = 'default';
      const img = document.createElement('img'); img.src = dayPhotos[id];
      wrap.appendChild(img);
      const lbl = document.createElement('div');
      lbl.className = 'slot-label'; lbl.textContent = _slotLabelFromId(id);
      wrap.appendChild(lbl);
      pGrid.appendChild(wrap);
    });
    sec.appendChild(pGrid);
    const divider = document.createElement('div'); divider.className = 'div';
    sec.appendChild(divider);
  }

  const totDiv = document.createElement('div'); totDiv.className = 'score-total';
  totDiv.innerHTML = `<div class="score-total-label">Day Total</div>
    <div style="display:flex;justify-content:center;margin-top:6px">${scoreRing(entryTotal(entry), entryMax(entry))}</div>`;
  sec.appendChild(totDiv);

  sec.appendChild(_scoreCards(entryRows(entry)));

  const regradeBtn = document.createElement('button');
  regradeBtn.className = 'btn btn-ghost btn-full';
  regradeBtn.style.marginTop = '14px';
  regradeBtn.textContent = 'Re-grade this day';
  regradeBtn.onclick = () => { S.regrade = true; S.photos = {}; S.thumbs = {}; render(); };
  sec.appendChild(regradeBtn);

  el.appendChild(sec);
}

// ── Grade tab ──
function renderGrade(el) {
  // Guard: ensure S.boy is valid
  if (!getChild(S.boy) && S.children.length > 0) S.boy = S.children[0].name;

  if (S.children.length === 0) {
    renderNoChildren(el);
    return;
  }

  // Child selector — large colored buttons, one per child
  const childSel = document.createElement('div');
  childSel.className = 'child-selector';
  S.children.forEach(child => {
    const btn = document.createElement('button');
    btn.className = 'child-btn';
    const isOn = S.boy === child.name;
    if (isOn) {
      btn.style.cssText = `background:${child.color};color:${readableOn(child.color)};box-shadow:0 4px 14px ${child.color}66;`;
    } else {
      btn.style.cssText = `background:${child.color}22;color:${child.color};`;
    }
    btn.textContent = child.name;
    btn.onclick = () => {
      if (S.boy === child.name) return;
      autoSave();
      gradingToken++; S.grading = false; S.gradePct = 0;
      S.boy = child.name; S.photos = {}; S.thumbs = {}; S.result = null; S.regrade = false; render();
    };
    childSel.appendChild(btn);
  });
  el.appendChild(childSel);

  // Day selector
  const dayCard = mkCard('Select Day');
  const dayRow = document.createElement('div');
  dayRow.className = 'day-row';
  DAYS.forEach(d => {
    const btn = document.createElement('button');
    const hasDone = !!(S.scores[S.boy] || {})[d];
    btn.className = 'day-pill' + (S.day===d ? ' on' : '') + (hasDone ? ' done' : '');
    btn.textContent = d;
    btn.onclick = () => {
      if (S.day === d) return;
      autoSave();
      gradingToken++; S.grading = false; S.gradePct = 0;
      S.day = d; S.photos = {}; S.thumbs = {}; S.result = null; S.regrade = false; render();
    };
    dayRow.appendChild(btn);
  });
  dayCard.appendChild(dayRow);

  // Day info: which rooms are graded for this child today.
  function dayInfoEl() {
    const active = roomsForDay(S.boy, S.day);
    const div = document.createElement('div');
    div.style.cssText = 'font-size:13px;color:var(--muted);margin-top:10px';
    if (!active.length) { div.textContent = 'No rooms set up yet — add one in Setup.'; return div; }
    const scheduled = allRooms().some(r => !r.everyday) && isScheduledDay(S.boy, S.day);
    div.innerHTML = (scheduled ? `<span class="badge badge-bath">Scheduled day</span> &nbsp;` : '')
      + `Grading: ${active.map(r => r.name).join(' + ')}`;
    return div;
  }

  if ((S.scores[S.boy] || {})[S.day] && !S.regrade && !S.result) {
    dayCard.appendChild(dayInfoEl());
    el.appendChild(dayCard);
    renderSavedScore(el, S.scores[S.boy][S.day]);
    return;
  }

  const active = roomsForDay(S.boy, S.day);
  dayCard.appendChild(dayInfoEl());
  el.appendChild(dayCard);
  if (!active.length) return;

  // Photo upload — one section per active room
  const photoCard = mkCard(`Today's Photos — ${S.boy} / ${S.day}`);
  active.forEach((room, ri) => {
    if (ri > 0) { const dv = document.createElement('div'); dv.className = 'div'; photoCard.appendChild(dv); }
    const lbl = document.createElement('div'); lbl.className = 'lbl'; lbl.textContent = room.name;
    photoCard.appendChild(lbl);
    const grid = document.createElement('div'); grid.className = 'slot-grid';
    for (let i = 0; i < room.daily; i++) {
      const id = dailySlotId(room, i);
      grid.appendChild(makeSlot(id, slotLabel(room, i, room.daily), S.photos[id] || null,
        b64 => { S.photos[id] = b64; render(); }, false,
        thumb => { S.thumbs[id] = thumb; }));
    }
    photoCard.appendChild(grid);
  });
  el.appendChild(photoCard);

  // Grade / progress
  if (S.grading) {
    const pCard = mkCard('Analyzing the room…');
    const prog = document.createElement('div'); prog.className = 'prog-wrap';
    const fill = document.createElement('div'); fill.className = 'prog-fill';
    fill.style.width = S.gradePct + '%';
    prog.appendChild(fill); pCard.appendChild(prog);
    const pLbl = document.createElement('div');
    pLbl.style.cssText = 'font-size:12px;color:var(--muted)';
    pLbl.textContent = S.gradePct < 65 ? 'Preparing images…' : S.gradePct < 88 ? 'Analyzing photos…' : 'Almost done…';
    pCard.appendChild(pLbl);
    el.appendChild(pCard);
  } else {
    const needSlots = [];
    active.forEach(r => { for (let i = 0; i < r.daily; i++) needSlots.push({ id: dailySlotId(r, i), label: slotLabel(r, i, r.daily) }); });

    const childColor = getChild(S.boy)?.color || 'var(--accent)';
    const gradeBtn = document.createElement('button');
    gradeBtn.className = 'btn btn-full';
    gradeBtn.style.cssText = `margin: 0 16px 8px; width: calc(100% - 32px); background:${childColor}; color:${readableOn(childColor)}; padding:13px 20px; border-radius:14px; font-size:17px; font-weight:600; cursor:pointer; border:none; display:inline-flex; align-items:center; justify-content:center; gap:8px;`;
    gradeBtn.innerHTML = `${ICON.cameraSmall}<span>Grade ${active.length > 1 ? S.boy + "'s Rooms" : S.boy + "'s " + active[0].name}</span>`;
    gradeBtn.onclick = gradePhotos;
    el.appendChild(gradeBtn);

    const needCount = needSlots.length;
    const haveCount = needSlots.filter(sl => !!S.photos[sl.id]).length;
    const checkRow = document.createElement('div');
    checkRow.style.cssText = 'display:flex;flex-wrap:wrap;align-items:center;gap:7px;margin:0 16px 16px';
    const tally = document.createElement('span');
    tally.style.cssText = 'font-size:12px;color:var(--muted);font-weight:600;margin-right:2px';
    tally.textContent = `${haveCount}/${needCount} photos`;
    checkRow.appendChild(tally);
    needSlots.forEach(sl => {
      const have = !!S.photos[sl.id];
      const chip = document.createElement('span');
      // Present = green check; missing = neutral gray dot (no harsh red).
      chip.style.cssText = `display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:4px 9px;border-radius:20px;`
        + (have
            ? `border:1px solid rgba(52,199,89,.35);color:var(--ok);background:rgba(52,199,89,.10);`
            : `border:1px solid var(--sep);color:var(--muted);background:transparent;`);
      const mark = document.createElement('span');
      mark.style.cssText = have
        ? 'color:var(--ok-fill);font-weight:700'
        : 'width:7px;height:7px;border-radius:50%;border:1.5px solid var(--muted);display:inline-block';
      if (have) mark.textContent = '✓';
      chip.appendChild(mark);
      chip.appendChild(document.createTextNode(sl.label));
      checkRow.appendChild(chip);
    });
    el.appendChild(checkRow);
  }

  if (S.result) renderResult(el, S.result);
}

function renderResult(el, result) {
  const boy = S.boy, day = S.day;
  const sec = mkCard(`Result — ${boy} / ${day}`);

  // Per-room rows from the AI result, clamped to each room's max.
  const rows = roomsForDay(boy, day).map(r => {
    let s = (result[r.id] || {}).s;
    s = typeof s === 'number' ? s : parseInt(s, 10);
    if (!Number.isFinite(s)) s = 0;
    s = Math.max(0, Math.min(r.points, s));
    return { label: r.name, s, max: r.points, n: (result[r.id] || {}).n || '' };
  });
  const rTot = rows.reduce((a, c) => a + c.s, 0);
  const maxPts = rows.reduce((a, c) => a + c.max, 0);

  const totDiv = document.createElement('div'); totDiv.className = 'score-total';
  totDiv.innerHTML = `<div class="score-total-label">Session Total</div>
    <div style="display:flex;justify-content:center;margin-top:6px">${scoreRing(rTot, maxPts)}</div>`;
  sec.appendChild(totDiv);

  sec.appendChild(_scoreCards(rows));

  const saveBtn = document.createElement('button');
  saveBtn.className = 'btn btn-primary btn-full';
  saveBtn.style.marginTop = '14px';
  saveBtn.textContent = 'Save to Tracker';
  saveBtn.onclick = saveResult;
  sec.appendChild(saveBtn);

  const discardBtn = document.createElement('button');
  discardBtn.className = 'btn btn-ghost btn-full';
  discardBtn.style.marginTop = '8px';
  discardBtn.textContent = 'Discard & Re-grade';
  discardBtn.onclick = () => { S.result = null; render(); };
  sec.appendChild(discardBtn);

  el.appendChild(sec);
}

// ── Summary tab ──
function renderSummary(el) {
  if (S.children.length === 0) {
    renderNoChildren(el);
    return;
  }

  // Print button — small, top-right
  const printWrap = document.createElement('div');
  printWrap.style.cssText = 'display:flex;justify-content:flex-end;padding:4px 16px 8px;';
  const printBtn = document.createElement('button');
  printBtn.className = 'btn btn-ghost btn-sm no-print';
  printBtn.innerHTML = `${ICON.printer} &nbsp;Print`;
  printBtn.onclick = () => window.print();
  printWrap.appendChild(printBtn);
  el.appendChild(printWrap);

  // ── Score summary cards ──
  const sumGrid = document.createElement('div');
  sumGrid.className = 'sum-grid';

  S.children.forEach(child => {
    const boy = child.name;
    const w = calcWeekly(boy);
    const card = document.createElement('div');
    card.className = 'sum-card';
    card.style.setProperty('--child-color', child.color);
    card.style.borderLeft = `4px solid ${child.color}`;

    const name = document.createElement('div');
    name.className = 'sum-name';
    name.style.color = child.color;
    name.textContent = boy;
    card.appendChild(name);

    if (!w) {
      const emp = document.createElement('div');
      emp.style.cssText = 'padding:12px 0 6px;text-align:center;';
      emp.innerHTML = `<div style="color:var(--muted);margin-bottom:8px;display:flex;justify-content:center">${ICON.chart}</div><div style="font-size:13px;color:var(--muted);line-height:1.4">No scores yet<br><span style="font-size:11px">Head to Grade to start</span></div>`;
      card.appendChild(emp);
    } else {
      const allWeekGraded = w.daysGraded === w.totalDays;
      const displayPct = w.projPct;

      const pts = document.createElement('div'); pts.className = 'sum-pts';
      pts.innerHTML = `${displayPct}<span style="font-size:22px;color:var(--muted)">%</span>`;
      card.appendChild(pts);

      if (!allWeekGraded) {
        const proj = document.createElement('div');
        proj.style.cssText = 'font-size:11px;color:var(--muted);margin-top:-2px;margin-bottom:4px;letter-spacing:.2px';
        proj.textContent = `projected · ${w.daysGraded}/${w.totalDays} days`;
        card.appendChild(proj);
      }

      // Progress bar in child color
      const barWrap = document.createElement('div');
      barWrap.style.cssText = 'height:4px;background:var(--tint);border-radius:2px;margin:8px 0 10px;overflow:hidden;';
      const barFill = document.createElement('div');
      barFill.style.cssText = `height:100%;width:${Math.min(displayPct,100)}%;border-radius:2px;background:${child.color};`;
      barWrap.appendChild(barFill);
      card.appendChild(barWrap);

      const allow = document.createElement('div'); allow.className = 'sum-allow';
      allow.style.color = child.color;
      allow.textContent = allowance(displayPct);
      card.appendChild(allow);

      const spark = weekSparkline(boy, child.color);
      if (spark) {
        const sw = document.createElement('div');
        sw.style.cssText = 'margin:8px 0 2px;';
        sw.innerHTML = spark;
        card.appendChild(sw);
      }

      const brk = document.createElement('div'); brk.className = 'sum-break';
      brk.innerHTML = `${w.earned}&thinsp;/&thinsp;${w.possible} pts${!allWeekGraded ? `<br>actual ${w.pct}%` : ''}`;
      card.appendChild(brk);
    }
    sumGrid.appendChild(card);
  });
  el.appendChild(sumGrid);

  // ── Per-child day breakdown ──
  const breakdownWrap = document.createElement('div');
  breakdownWrap.className = 'breakdown-wrap';

  S.children.forEach(child => {
    const boy = child.name;
    const card = mkCard('');
    // Custom title row with colored dot
    const titleRow = document.createElement('div');
    titleRow.style.cssText = 'display:flex;align-items:center;gap:8px;padding:14px 16px 8px;';
    const dot = document.createElement('span');
    dot.style.cssText = `width:9px;height:9px;border-radius:50%;background:${child.color};display:inline-block;flex-shrink:0;`;
    const titleTxt = document.createElement('span');
    titleTxt.style.cssText = 'font-size:13px;font-weight:400;color:var(--muted);text-transform:uppercase;letter-spacing:0.4px;';
    titleTxt.textContent = `${boy} — Daily Breakdown`;
    titleRow.appendChild(dot); titleRow.appendChild(titleTxt);
    card.insertBefore(titleRow, card.firstChild);

    const entries = Object.entries(S.scores[boy] || {})
      .sort((a,b) => DAYS.indexOf(a[0]) - DAYS.indexOf(b[0]));

    if (!entries.length) {
      const emp = document.createElement('div');
      emp.style.cssText = 'text-align:center;padding:16px;font-size:14px;color:var(--muted);';
      emp.textContent = 'No days graded yet';
      card.appendChild(emp);
    } else {
      entries.forEach(([d, e]) => {
        const row = document.createElement('div'); row.className = 'day-row-entry';

        const nameEl = document.createElement('div'); nameEl.className = 'day-row-name'; nameEl.textContent = d;
        row.appendChild(nameEl);

        const total = entryTotal(e);
        const maxPts = entryMax(e) || 1;
        const pct = Math.round((total / maxPts) * 100);
        const barColor = pct >= 85 ? 'var(--ok)' : pct >= 60 ? 'var(--warn)' : 'var(--err)';

        // Mini score bar
        const miniBar = document.createElement('div');
        miniBar.style.cssText = 'flex:1;height:4px;background:var(--tint);border-radius:2px;overflow:hidden;margin:0 8px;';
        const miniFill = document.createElement('div');
        miniFill.style.cssText = `height:100%;width:${pct}%;background:${barColor};border-radius:2px;`;
        miniBar.appendChild(miniFill);
        row.appendChild(miniBar);

        const pts = document.createElement('div'); pts.className = 'day-row-pts';
        pts.style.color = barColor;
        pts.innerHTML = `${total}<span style="color:var(--muted);font-size:11px;font-weight:400"> /${maxPts}</span>`;
        row.appendChild(pts);

        const del = document.createElement('button');
        del.className = 'btn btn-ghost btn-sm';
        del.textContent = '×';
        del.onclick = () => {
          delete S.scores[boy][d];
          if (S.savedPhotos[boy]) delete S.savedPhotos[boy][d];
          _deletePhoto(boy, d);
          saveScores();
          showMsg(`Deleted ${boy} ${d}`, 'info');
        };
        row.appendChild(del);

        card.appendChild(row);
      });
    }
    breakdownWrap.appendChild(card);
  });
  el.appendChild(breakdownWrap);

  // ── Allowance scale ──
  const m = S.maxAllowance || 50;
  const scaleCard = mkCard(`Allowance Scale (max $${Math.round(m)})`);
  const scaleTiers = [
    ['90 – 100%', '$' + Math.round(m),          'var(--ok)'],
    ['80 – 89%',  '$' + Math.round(m * 0.90),   'var(--ok)'],
    ['70 – 79%',  '$' + Math.round(m * 0.80),   'var(--warn)'],
    ['60 – 69%',  '$' + Math.round(m * 0.70),   'var(--warn)'],
    ['50 – 59%',  '$' + Math.round(m * 0.60),   'var(--err)'],
    ["< 50%",     "Parents' call",               'var(--muted)'],
  ];
  scaleTiers.forEach(([range, amt, color], i) => {
    const r = document.createElement('div');
    r.style.cssText = `display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:0.5px solid var(--sep);${i % 2 === 1 ? 'background:var(--bg);' : ''}`;
    r.innerHTML = `<span style="font-size:13px;color:var(--muted)">${range}</span><span style="font-weight:700;font-size:15px;color:${color}">${amt}</span>`;
    scaleCard.appendChild(r);
  });
  el.appendChild(scaleCard);

  // ── Week Management ──
  const resetCard = mkCard('Week Management');
  resetCard.classList.add('no-print');
  const hint = document.createElement('div');
  hint.className = 'hint'; hint.style.marginBottom = '10px';
  hint.textContent = 'Clears scores and photos for that week. Baseline images are never affected.';
  resetCard.appendChild(hint);

  const btnRow = document.createElement('div');
  btnRow.className = 'row wrap'; btnRow.style.gap = '8px'; btnRow.style.padding = '0 16px 14px';

  S.children.forEach(child => {
    const btn = document.createElement('button');
    btn.style.cssText = `border:1.5px solid ${child.color};color:${child.color};background:transparent;padding:8px 16px;font-size:14px;font-weight:600;border-radius:10px;cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,sans-serif;`;
    btn.textContent = `Clear ${child.name}'s Week`;
    btn.onclick = () => {
      if (!confirm(`Confirm clear ${child.name}'s week?`)) return;
      DAYS.forEach(d => _deletePhoto(child.name, d));
      S.scores[child.name] = {};
      S.savedPhotos[child.name] = {};
      if (S.boy === child.name) {
        S.result = null; S.regrade = false; S.photos = {}; S.thumbs = {};
        gradingToken++; S.grading = false; S.gradePct = 0;
      }
      saveScores();
      showMsg(`${child.name}'s week cleared!`, 'ok');
    };
    btnRow.appendChild(btn);
  });

  if (S.children.length > 1) {
    const resetAllBtn = document.createElement('button');
    resetAllBtn.style.cssText = 'border:1.5px solid var(--sep);color:var(--muted);background:transparent;padding:8px 16px;font-size:14px;font-weight:600;border-radius:10px;cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,sans-serif;';
    resetAllBtn.textContent = 'Clear All';
    resetAllBtn.onclick = () => {
      if (!confirm('Confirm clear all weeks?')) return;
      S.children.forEach(c => DAYS.forEach(d => _deletePhoto(c.name, d)));
      S.children.forEach(c => { S.scores[c.name] = {}; S.savedPhotos[c.name] = {}; });
      S.result = null; S.regrade = false; S.photos = {}; S.thumbs = {};
      gradingToken++; S.grading = false; S.gradePct = 0;
      saveScores();
      showMsg('All weeks cleared!', 'ok');
    };
    btnRow.appendChild(resetAllBtn);
  }

  resetCard.appendChild(btnRow);
  el.appendChild(resetCard);
}

// ─── Helper: create card ──────────────────────────────────────────────────────
function mkCard(title) {
  const card = document.createElement('div');
  card.className = 'card';
  if (title) {
    const t = document.createElement('div'); t.className = 'card-title'; t.textContent = title;
    card.appendChild(t);
  }
  return card;
}

// ─── Init ─────────────────────────────────────────────────────────────────────
function renderSplash() {
  const tabsEl = document.getElementById('tabs');
  if (tabsEl) tabsEl.style.display = 'none';
  const el = document.getElementById('page');
  el.innerHTML = `<div class="splash"><div class="splash-mark">${BRAND_MARK}</div><div class="splash-text">Loading…</div></div>`;
}

async function init() {
  S.authed = false;
  API.token = localStorage.getItem('rsc_token') || '';

  // Branded splash while we check the session / load data (no blank flash).
  if (API.token) renderSplash();

  // Find out which social sign-in buttons + reminders are available.
  await loadAuthConfig();
  await loadPushConfig();
  // Register the service worker (push receiver) — best effort.
  if ('serviceWorker' in navigator) { navigator.serviceWorker.register('/sw.js').catch(() => {}); }

  // Co-parent invite link: ?join=<code>. Remember it; we'll offer to join
  // after the user is signed in.
  const params = new URLSearchParams(location.search);
  const joinCode = params.get('join');
  if (joinCode) {
    S.pendingJoin = joinCode;
    history.replaceState({}, document.title, location.pathname);
  }

  // Password-reset link: ?reset=<token>. Show the reset screen and strip the
  // token from the address bar so it isn't left in history.
  const resetTok = params.get('reset');
  if (resetTok) {
    history.replaceState({}, document.title, location.pathname);
    S.resetToken = resetTok;
    S.authMode = 'reset';
    render();
    return;
  }

  // If we have a saved token, try to load the account's data.
  if (API.token) {
    const res = await loadData();
    if (res === 'ok') {
      S.authed = true;
      render();
      maybeProcessPendingJoin();
      return;
    }
    if (res === 'error') {
      // Network/server hiccup — DON'T discard the session; let the user retry.
      renderConnError();
      return;
    }
    // res === 'auth': token is stale/invalid → clear it and show sign-in.
    API.token = '';
    localStorage.removeItem('rsc_token');
  }

  S.authMode = 'login';
  render();
}

// Shown when a returning user's data couldn't load due to a connection/server
// problem. The saved token is kept; tapping Retry re-runs init().
function renderConnError() {
  const tabsEl = document.getElementById('tabs');
  if (tabsEl) tabsEl.style.display = 'none';
  const el = document.getElementById('page');
  el.innerHTML = '';
  const card = document.createElement('div');
  card.className = 'card';
  card.style.cssText = 'max-width:380px;margin:40px auto 16px;padding:28px 20px;text-align:center;';
  card.innerHTML = `<div style="color:var(--muted);margin-bottom:12px;display:flex;justify-content:center">${ICON.cloudOff}</div>
    <div style="font-size:18px;font-weight:700;margin-bottom:6px">Can't reach the server</div>
    <div style="font-size:14px;color:var(--muted);line-height:1.5;margin-bottom:18px">
      You're still signed in — this looks like a connection problem. Check your internet and try again.</div>`;
  const btn = document.createElement('button');
  btn.className = 'btn btn-primary btn-full';
  btn.textContent = 'Retry';
  btn.onclick = () => { el.innerHTML = ''; init(); };
  card.appendChild(btn);
  el.appendChild(card);
}
init();
</script>
